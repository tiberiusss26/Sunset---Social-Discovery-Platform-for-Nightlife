# ─────────────────────────────────────────────────────────────────────────────
# TEST profile — activated automatically by @ActiveProfiles("test") in tests.
# Uses H2 in-memory database: starts instantly, no installation needed,
# destroyed completely when the JVM exits — perfect for isolated tests.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    # The H2 URL format: jdbc:h2:mem:NAME;options
    # MODE=PostgreSQL makes H2 behave like PostgreSQL (same SQL syntax)
    url: jdbc:h2:mem:nightout_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # create-drop: Hibernate creates the schema when the test starts
      # and drops it completely when the test finishes.
      # This guarantees every test starts with a clean, empty database.
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  # Disable Redis in tests — we don't want real caching during unit tests
  # (it would make tests slow and order-dependent)
  cache:
    type: none

  # H2's web console — accessible at http://localhost:8082/h2-console during tests
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.nightout: INFO   # Less verbose in tests — only warnings and errors
    org.hibernate.orm.jdbc.bind: INFO